<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Global Basket — многостраничный интернет-магазин премиальных орехов с акцентом на очищенную макадамию."
    />
    <title>Global Basket | Главная</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Prata&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles/global.css" />
  </head>
  <body data-page="home" data-nav="home">
    <div data-site-header></div>

    <main>
      <section class="page-hero page-hero--home">
        <div class="shell">
          <div id="home-service-note"></div>
          <div class="banner-grid" id="home-banners"></div>
        </div>
      </section>

      <section class="page-section page-section--compact">
        <div class="shell">
          <div class="mini-category-row" id="home-categories"></div>
        </div>
      </section>

      <section class="page-section page-section--tinted">
        <div class="shell" id="home-featured-shelf"></div>
      </section>

      <section class="page-section page-section--compact">
        <div class="shell">
          <div class="store-promo-grid" id="home-merch-band"></div>
        </div>
      </section>

      <section class="page-section">
        <div class="shell">
          <div class="newsletter-panel">
            <div>
              <p class="eyebrow">Подпишитесь на обновления витрины</p>
              <h2>Следите за запуском новых разделов, категорий и SKU в каталоге Global Basket.</h2>
            </div>
            <form class="newsletter-form" data-demo-form>
              <input type="email" placeholder="Ваш email" aria-label="Email" required />
              <button class="button button--small" type="submit">Подписаться</button>
              <p class="form-note" data-form-note>
                Подписка пока работает как MVP-интерфейс для будущей email-системы.
              </p>
            </form>
          </div>
        </div>
      </section>

      <section class="page-section">
        <div class="shell" id="home-new-shelf"></div>
      </section>

      <section class="page-section page-section--compact">
        <div class="shell">
          <div class="section-head section-head--store">
            <div>
              <p class="eyebrow">Журнал</p>
              <h2>Истории о продукте и развитии витрины.</h2>
            </div>
            <a class="text-link section-head__link" href="/journal/">Все материалы</a>
          </div>
          <div class="article-grid" id="home-journal-cards"></div>
        </div>
      </section>
    </main>

    <div data-site-footer></div>

    <script src="/scripts/data.js"></script>
    <script src="/scripts/main.js"></script>
  </body>
</html>
