<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Global Basket — многостраничный интернет-магазин премиальных орехов с акцентом на очищенную макадамию."
    />
    <title>Global Basket | Главная</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Rubik:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles/global.css" />
  </head>
  <body data-page="home" data-nav="home">
    <div data-site-header></div>

    <main>
      <section class="page-hero page-hero--home">
        <div class="shell" id="home-hero"></div>
      </section>

      <section class="page-section page-section--compact">
        <div class="shell">
          <div class="section-head section-head--compact">
            <p class="eyebrow">Категории</p>
            <h2>Ключевые направления собраны в одной чистой витрине.</h2>
          </div>
          <div class="category-grid" id="home-categories"></div>
        </div>
      </section>

      <section class="page-section page-section--tinted">
        <div class="shell" id="home-featured"></div>
      </section>

      <section class="page-section">
        <div class="shell" id="home-benefits"></div>
      </section>

      <section class="page-section page-section--compact">
        <div class="shell">
          <div class="section-head section-head--store">
            <div>
              <p class="eyebrow">Ближайшие разделы</p>
              <h2>Новые направления будут появляться постепенно и без перегруза главной страницы.</h2>
            </div>
            <a class="text-link section-head__link" href="/catalog/">В каталог</a>
          </div>
          <div class="store-promo-grid" id="home-future"></div>
        </div>
      </section>

      <section class="page-section page-section--compact">
        <div class="shell">
          <div class="section-head section-head--store">
            <div>
              <p class="eyebrow">Журнал</p>
              <h2>Материалы о продукте, упаковке и развитии магазина.</h2>
            </div>
            <a class="text-link section-head__link" href="/journal/">Читать</a>
          </div>
          <div class="article-grid" id="home-journal-cards"></div>
        </div>
      </section>
    </main>

    <div data-site-footer></div>

    <script src="/scripts/data.js"></script>
    <script src="/scripts/main.js"></script>
  </body>
</html>
