<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Карточка товара Global Basket: очищенная макадамия, свойства, упаковка, маркетплейсы и запрос."
    />
    <title>Global Basket | Очищенная макадамия</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Rubik:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles/global.css" />
  </head>
  <body data-page="product" data-nav="catalog">
    <div data-site-header></div>

    <main>
      <section class="page-hero">
        <div class="shell">
          <div class="breadcrumb">
            <a href="/">Главная</a>
            <span>/</span>
            <a href="/catalog/">Каталог</a>
            <span>/</span>
            <span>Очищенная макадамия</span>
          </div>
          <div class="product-layout">
            <div class="product-gallery" id="product-gallery"></div>
            <div class="product-summary" id="product-summary"></div>
          </div>
        </div>
      </section>

      <section class="page-section">
        <div class="shell">
          <div class="section-head">
            <p class="eyebrow">Польза макадамии</p>
            <h2>Ключевые микроэлементы собраны так, чтобы продукт воспринимался как сильная премиальная позиция.</h2>
          </div>
          <div class="benefit-grid" id="product-benefits"></div>
        </div>
      </section>

      <section class="page-section" id="marketplaces-pdp">
        <div class="shell">
          <div class="section-head">
            <p class="eyebrow">Где купить</p>
            <h2>Маркетплейсы дают дополнительный канал доверия и покупки.</h2>
          </div>
          <div class="marketplace-grid" id="product-marketplaces"></div>
        </div>
      </section>

      <section class="page-section page-section--compact">
        <div class="shell">
          <div class="section-head">
            <p class="eyebrow">Частые вопросы</p>
            <h2>Отвечаем на самые важные вопросы о продукте и заказе.</h2>
          </div>
          <div class="faq-list" id="product-faq"></div>
        </div>
      </section>
    </main>

    <div data-site-footer></div>

    <script src="/scripts/data.js"></script>
    <script src="/scripts/main.js"></script>
  </body>
</html>
