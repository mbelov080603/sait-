<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Каталог Global Basket: премиальная макадамия и структура под будущие категории орехов, сухофруктов и наборов."
    />
    <title>Global Basket | Каталог</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Rubik:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles/global.css" />
  </head>
  <body data-page="catalog" data-nav="catalog">
    <div data-site-header></div>

    <main>
      <section class="page-hero">
        <div class="shell">
          <div class="breadcrumb">
            <a href="/">Главная</a>
            <span>/</span>
            <span>Каталог</span>
          </div>
          <div class="hero-copy">
            <p class="eyebrow">Каталог</p>
            <h1>Каталог премиальных орехов</h1>
            <p>
              Стартовая витрина Global Basket: активная макадамия, подготовленные
              категории и быстрые маршруты к карточке товара и сервисным разделам.
            </p>
          </div>
        </div>
      </section>

      <section class="page-section">
        <div class="shell catalog-layout">
          <aside class="catalog-sidebar" id="catalog-filters"></aside>
          <div class="catalog-main">
            <div class="catalog-toolbar">
              <strong>1 активная позиция</strong>
              <span>и несколько направлений каталога уже в roadmap</span>
            </div>
            <div class="store-promo-grid store-promo-grid--catalog" id="catalog-quick-band"></div>
            <div class="shelf-grid shelf-grid--catalog" id="catalog-grid"></div>
          </div>
        </div>
      </section>

      <section class="page-section page-section--compact">
        <div class="shell" id="catalog-collections"></div>
      </section>
    </main>

    <div data-site-footer></div>

    <script src="/scripts/data.js"></script>
    <script src="/scripts/main.js"></script>
  </body>
</html>
